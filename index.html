<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="cover">
    <div class="cover-inner">
      <p class="eyebrow">Vol. I &nbsp;&middot;&nbsp; opened <span id="todayLong"></span></p>
      <h1 class="title">Habit&nbsp;Ledger</h1>
      <p class="tagline">Keep the record. Break nothing.</p>
    </div>
    <div class="stitching" aria-hidden="true"></div>
  </header>

  <main class="pages">

    <section class="new-entry" aria-label="Add a new habit">
      <form id="habitForm" class="entry-form">
        <label for="habitInput" class="entry-label">Open a new page</label>
        <div class="entry-row">
          <input type="text" id="habitInput" name="habitInput" placeholder="e.g. Morning run, Read 20 pages, Drink water" autocomplete="off" maxlength="60" required>
          <button type="submit" class="btn-add">+ Add habit</button>
        </div>
      </form>
    </section>

    <section id="habitList" class="habit-list" aria-label="Your habits"></section>

    <p id="emptyState" class="empty-state">No pages yet — open one above to start your first record.</p>

    <template id="habitCardTemplate">
      <article class="habit-card">
        <div class="card-top">
          <div class="card-heading">
            <h2 class="habit-name"></h2>
            <p class="habit-since">since <span class="since-date"></span></p>
          </div>
          <div class="seals">
            <div class="seal seal-current" title="Current streak">
              <span class="seal-number current-streak">0</span>
              <span class="seal-label">current</span>
            </div>
            <div class="seal seal-best" title="Best streak">
              <span class="seal-number best-streak">0</span>
              <span class="seal-label">best</span>
            </div>
          </div>
          <button type="button" class="btn-retire" title="Retire this habit" aria-label="Retire this habit">&times;</button>
        </div>
        <div class="calendar-wrap">
          <div class="weekday-row" aria-hidden="true">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="calendar-grid"></div>
        </div>
      </article>
    </template>

  </main>

  <footer class="colophon">
    <p>Records live only in this browser's storage — <span id="habitCount">0</span> active page(s).</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
